# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Sessions and windows
set -g detach-on-destroy off
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename off
set -g set-titles on
set -g set-titles-string '#S: #W'

# Terminal behavior
set -g mouse on
set -g history-limit 100000
set -sg escape-time 10
set -as terminal-features ',xterm-ghostty:RGB'

# Project workflow
bind p display-popup -E -w 70% -h 70% -T ' Projects ' "$HOME/.local/bin/tmux-project open"
bind X display-popup -E -w 70% -h 70% -T ' Stop project ' "$HOME/.local/bin/tmux-project stop"
bind h switch-client -t home
bind t run-shell -b "$HOME/.local/bin/tmux-project clone '#{session_name}' '#{window_name}' '#{pane_current_path}' '#{window_id}'"
bind ] next-window
bind [ previous-window
bind Right next-window
bind Left previous-window

# Convenience
bind r source-file ~/.config/tmux/tmux.conf \; display-message 'tmux config reloaded'
bind x if-shell -F '#{==:#{pane_current_command},#{b:default-shell}}' kill-pane 'confirm-before -p "kill-pane #P? (y/n)" kill-pane'
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Keep project and window names visible without extra decoration.
set -g status-left-length 40
set -g status-left '#[bold] #S #[default]'
set -g status-right '#[dim]%Y-%m-%d %H:%M '
set -g window-status-format ' #I:#W '
set -g window-status-current-format '#[reverse,bold] #I:#W #[default]'
